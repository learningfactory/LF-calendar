<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Printer Schedule (14 Slots)</title>

    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/google-calendar@5.11.3/main.global.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css">
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; padding: 20px; }
        
        .calendar-container {
            display: flex;
            overflow-x: auto; /* 14개가 넘어가면 가로 스크롤 발생 */
            padding: 10px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            gap: 2px; /* 칼럼 사이 아주 미세한 간격 */
        }
        
        .calendar-box {
            display: inline-block;
            flex-shrink: 0; 
        }

        .calendar-title {
            font-size: 13px; /* 항목이 많아졌으므로 폰트 약간 축소 */
            font-weight: bold;
            padding: 8px 0;
            text-align: center;
            background: #f1f1f1;
            margin: 0;
            border: 1px solid #ddd;
            border-bottom: none;
        }

        .calendar {
            width: 120px; /* 개별 너비를 살짝 줄여 더 많이 보이게 조절 */
            height: 600px; 
            border: 1px solid #ddd;
        }

        .date-controls { text-align: center; margin-bottom: 25px; }
        #main-date { font-size: 24px; font-weight: bold; color: #333; display: block; margin-bottom: 15px; }
        .date-controls button { 
            padding: 8px 15px; margin: 0 5px; cursor: pointer; border-radius: 4px; 
            border: 1px solid #007bff; background: #fff; color: #007bff; font-weight: bold;
        }
        .date-controls button:hover { background: #007bff; color: #fff; }

        /* FullCalendar UI 숨김 처리 */
        .fc-col-header { display: none; } 
        .fc-timegrid-slot-label { display: none !important; } 
        .fc-timegrid-slot { height: 25px !important; } 
        .fc-event { border: none !important; cursor: default !important; } 
        
        /* 첫 번째 칼럼(No.01)에만 시간 표시 */
        .calendar-box:first-child .fc-timegrid-slot-label { 
            display: block !important; 
            width: 50px; 
            font-size: 11px !important; 
            text-align: right;
            padding-right: 5px;
        }
        .calendar-box:first-child .calendar { width: 170px; }

        .event-text { font-size: 11px; color: white; padding: 2px; overflow: hidden; text-overflow: ellipsis; }
    </style>
</head>
<body>

    <div class="date-controls">
        <span id="main-date"></span>
        <button onclick="changeDate(-1)">◀ Prev.</button>
        <button onclick="goToToday()">Today</button>
        <button onclick="changeDate(1)">Next ▶</button>
    </div>
    
    <div class="calendar-container">

    </div>

    <script>
        let currentDate = new Date();
        window.calendars = [];

        function updateMainDate() {
            let options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('main-date').innerText = currentDate.toLocaleDateString('ko-KR', options);
        }

        function changeDate(days) {
            currentDate.setDate(currentDate.getDate() + days);
            updateMainDate();
            calendars.forEach(cal => cal.gotoDate(currentDate));
        }

        function goToToday() {
            currentDate = new Date();
            updateMainDate();
            calendars.forEach(cal => cal.gotoDate(currentDate));
