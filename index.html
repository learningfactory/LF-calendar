<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Printer Schedule (Natural Shading)</title>

    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/google-calendar@5.11.3/main.global.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css">
    
    <style>
        /* 기본 레이아웃 및 순백색 배경 */
        html, body { 
            font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif; 
            background-color: #ffffff; margin: 0; padding: 0; 
            height: 100%; overflow: hidden; position: fixed; width: 100%;
        }
        
        .header-section {
            text-align: center; padding: 12px 0;
            background: #ffffff; border-bottom: 1px solid #ddd;
            height: 95px; box-sizing: border-box;
        }
        .main-date { display: block; font-size: 18px; font-weight: bold; margin-bottom: 8px; }
        .date-controls { display: flex; justify-content: center; align-items: center; gap: 6px; }
        .date-controls button { 
            width: 70px; height: 30px; font-size: 11px; cursor: pointer;
            border: 1px solid #ccc; background: #fff; border-radius: 4px;
        }

        .outer-wrapper {
            display: flex; position: relative; background: #ffffff; 
            overflow-x: auto; overflow-y: hidden;
            height: calc(100vh - 95px); width: 100%;
        }

        /* 시각 칼럼 숫자 크기 축소 */
        .time-column {
            width: 45px; flex-shrink: 0; background-color: #ffffff; border-right: 1px solid #ddd;
            position: sticky; left: 0; z-index: 501; height: calc(35px + (24px * 15)); 
        }
        .time-header { height: 35px; border-bottom: 1px solid #ddd; }
        .time-slot-sync {
            height: 24px; display: flex; align-items: flex-start;
            justify-content: flex-end; padding-right: 6px; position: relative;
        }
        .time-slot-sync span { font-size: 7pt; color: #888; transform: translateY(-6px); }

        .calendar-container { display: inline-flex; position: relative; height: fit-content; background-color: #ffffff; }

        /* 실시간 빨간 선 */
        #now-indicator-line {
            position: absolute; left: 0; width: 100%; height: 2px;
            background-color: #ff0000; z-index: 100; pointer-events: none; display: none;
        }

        .calendar-box { 
            width: 75px; max-width: 75px; flex-shrink: 0; 
            border-right: 1px solid #e5e5e5; background-color: #ffffff;
        }
        .calendar-title {
            font-size: 10px; font-weight: bold; height: 35px; line-height: 35px; 
            text-align: center; background: #ffffff; border-bottom: 1px solid #ddd; margin: 0;
        }

        /* FullCalendar 내부 슬롯 순백색 */
        .fc-timegrid-slot { height: 24px !important; border-bottom: 1px solid #e5e5e5 !important; background-color: #ffffff !important; }
        .fc { max-width: 75px !important; background-color: transparent !important; }
        .fc-col-header, .fc-timegrid-slot-label { display: none !important; }
        
        /* 이벤트 기본 디자인 */
        .fc-event { border: none !important; border-radius: 4px !important; margin: 1px !important; pointer-events: none !important; transition: opacity 0.3s ease; }

        /* [핵심] 구글 캘린더 스타일의 자연스러운 과거 음영 처리 */
        .fc-event-past { 
            opacity: 0.35 !important; /* 탁해지는 필터 대신 투명도를 주어 자연스럽게 처리 */
            filter: saturate(0.5) !important; /* 채도만 살짝 낮춤 */
        }
        
        .event-text { font-size: 8px; color: white; padding: 2px; text-align: center; line-height: 1.2; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header-section">
        <span class="main-date" id="main-date"></span>
        <div class="date-controls">
            <button onclick="changeDate(-1)">◀ Prev</button>
            <button onclick="goToToday()">Today</button>
            <button onclick="changeDate(1)">Next ▶</button>
        </div>
    </div>
    
    <div class="outer-wrapper">
        <div class="time-column" id="time-column">
            <div class="time-header"></div>
        </div>
        <div class="calendar-container">
            <div id="now-indicator-line"></div>
            <script>
                const titles = ["No.01","No.02","No.03","No.04","No.05","No.06","No.07","No.08","test.01","test.02","test.03","test.04","test.05","test.06"];
                titles.forEach((t, i) => {
                    document.write(`<div class="calendar-box"><h3 class="calendar-title">${t}</h3><div id="calendar${i+1}" class="calendar"></div></div>`);
                });
            </script>
        </div>
    </div>

    <script>
        // 주석: 구글 캘린더처럼 자연스러운 투명도 음영을 적용하고, 1분마다 실시간으로 과거 건을 체크하여 업데이트합니다. [사용자 정보 반영]
        let currentDate = new Date();
        window.calendars = [];

        function syncTimeColumn() {
            const col = document.getElementById('time-column');
            for(let i = 9; i <= 23; i++) {
                const slot = document.createElement('div');
                slot.className = 'time-slot-sync';
                slot.innerHTML = `<span>${i.toString().padStart(2, '0')}:00</span>`;
                col.appendChild(slot);
            }
        }

        // [핵심] 실시간 음영 업데이트 로직
        function updateRealTimeShading() {
            const now = new Date();
            calendars.forEach(calendar => {
                calendar.getEvents().forEach(event => {
                    // 이벤트가 현재 시간보다 이전에 끝났다면 fc-event-past 클래스 추가
                    if (event.end < now) {
                        if (!event.classNames.includes('fc-event-past')) {
                            event.setProp('classNames', ['fc-event-past']);
                        }
                    } else {
                        // 미래의 예약이면 클래스 제거
                        if (event.classNames.includes('fc-event-past')) {
                            event.setProp('classNames', []);
                        }
                    }
                });
            });
        }

        function updateMainDate() {
            const dateStr = currentDate.toLocaleDateString('ko-KR', { year: 'numeric', month: 'numeric', day: 'numeric' });
            const dayStr = currentDate.toLocaleDateString('en-US', { weekday: 'short' }).toUpperCase();
            document.getElementById('main-date').innerText = `${dateStr} (${dayStr})`;
            updateRedLine();
            calendars.forEach(cal => cal.refetchEvents());
        }

        function updateRedLine() {
            const line = document.getElementById('now-indicator-line');
            const now = new Date();
            if (now.toDateString() === currentDate.toDateString()) {
                const startHour = 9;
                const currentHour = now.getHours() + (now.getMinutes() / 60);
                if (currentHour >= 9 && currentHour <= 23) {
                    const position = (currentHour - startHour) * 24 + 35;
                    line.style.top = position + "px"; line.style.display = "block";
                } else { line.style.display = "none"; }
            } else { line.style.display = "none"; }
        }

        function changeDate(days) {
            currentDate.setDate(currentDate.getDate() + days);
            updateMainDate();
            calendars.forEach(cal => cal.gotoDate(currentDate));
        }

        function goToToday() {
            currentDate = new Date();
            updateMainDate();
            calendars.forEach(cal => cal.gotoDate(currentDate));
        }

        document.addEventListener('DOMContentLoaded', function() {
            syncTimeColumn();
            
            const calendarData = [
                { id: "learningfactory01@gmail.com", element: "calendar1", color: "#34A853" },
                { id: "learningfactory11@gmail.com", element: "calendar2", color: "#34A853" },
                { id: "learningfactory03@gmail.com", element: "calendar3", color: "#34A853" },
                { id: "learningfactory13@gmail.com", element: "calendar4", color: "#34A853" },
                { id: "learningfactory05@gmail.com", element: "calendar5", color: "#34A853" },
                { id: "learningfactory06@gmail.com", element: "calendar6", color: "#34A853" },
                { id: "learningfactory10@gmail.com", element: "calendar7", color: "#34A853" },
                { id: "learningfactory08@gmail.com", element: "calendar8", color: "#34A853" },
                { id: "learningfactory04@gmail.com", element: "calendar9", color: "#4285F4" },
                { id: "learningfactory09@gmail.com", element: "calendar10", color: "#4285F4" },
                { id: "learningfactory19@gmail.com", element: "calendar11", color: "#4285F4" },
                { id: "learningfactory20@gmail.com", element: "calendar12", color: "#4285F4" },
                { id: "learningfactory12@gmail.com", element: "calendar13", color: "#4285F4" },
                { id: "learningfactory24@gmail.com", element: "calendar14", color: "#4285F4" }
            ];

            calendarData.forEach((cal) => {
                let calendar = new FullCalendar.Calendar(document.getElementById(cal.element), {
                    initialView: 'timeGridDay',
                    timeZone: 'Asia/Seoul',
                    slotMinTime: '09:00:00', slotMaxTime: '23:00:00',
                    slotDuration: '01:00:00', allDaySlot: false,
                    contentHeight: 'auto', headerToolbar: false,
                    googleCalendarApiKey: "AIzaSyAUU-C7wQhYfOYaGbm4VdhJ6kKqgeru4MM",
                    eventSources: [{ googleCalendarId: cal.id, color: cal.color }],
                    
                    eventDidMount: function(info) {
                        const now = new Date();
                        if (info.event.end < now) {
                            info.el.classList.add('fc-event-past');
                        }
                    },
                    // 이벤트 데이터 로드 후 실시간 업데이트 호출
                    eventsSet: function() {
                        updateRealTimeShading();
                    },
                    eventContent: function(arg) {
                        let domNode = document.createElement('div');
                        domNode.className = 'event-text';
                        domNode.innerHTML = `<strong>${arg.event.title}</strong>`; 
                        return { domNodes: [domNode] };
                    }
                });
                calendar.render();
                calendars.push(calendar);
            });

            updateMainDate();

            // 1분마다 빨간 선 위치와 예약 건의 음영 상태를 실시간 체크
            setInterval(() => {
                updateRedLine();
                updateRealTimeShading();
            }, 60000);

            setTimeout(() => {
                updateRedLine();
                updateRealTimeShading();
            }, 1000);
        });
    </script>
</body>
</html>
