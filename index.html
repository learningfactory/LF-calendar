<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Printer Schedule (Perfect Compressed)</title>

    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/google-calendar@5.11.3/main.global.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css">
    
    <style>
        /* 1. 전체 레이아웃: 스크롤 방지 및 중앙 정렬 */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #f8f9fa; 
            margin: 0; 
            padding: 5px; 
            overflow: hidden; /* 페이지 전체 스크롤 차단 */
        }
        
        /* 캘린더들을 감싸는 컨테이너: 중앙 정렬 추가 */
        .calendar-container {
            display: flex;
            justify-content: center; /* 캘린더들을 화면 가운데로 모음 */
            background-color: white;
            gap: 0; 
            border: 1px solid #ddd;
            overflow-x: auto; /* 가로가 넘칠 때만 가로 스크롤 허용 */
        }
        
        .calendar-box { display: inline-block; flex-shrink: 0; border-right: 1px solid #eee; }

        /* 2. 가로 폭 압축 (75px) */
        .calendar-title {
            font-size: 11px; font-weight: bold; margin: 0; padding: 4px 0;
            text-align: center; background: #eee; border-bottom: 1px solid #ddd;
        }

        .calendar {
            width: 75px; 
            height: 85vh; /* 화면 높이에 맞춰 유동적으로 조절 */
            background-color: white;
        }

        /* 첫 번째 시간축 칼럼만 조금 더 넓게 설정 */
        .calendar-box:first-child .calendar { width: 115px; }

        /* 3. 상단 컨트롤바 슬림화 */
        .date-controls { text-align: center; padding: 5px 0; background: #fff; }
        .main-date { font-size: 18px; font-weight: bold; margin-right: 15px; vertical-align: middle; }
        .date-controls button { 
            width: 65px; height: 26px; font-size: 11px; cursor: pointer; 
            border: 1px solid #ccc; background: #fff; vertical-align: middle;
        }

        /* 4. [핵심] 세로 내용물 초압축 (CSS 강제 조정) */
        .fc-col-header { display: none; } /* 요일 헤더 숨김 */
        .fc-timegrid-slot-label { display: none !important; border: none !important; }
        
        /* 슬롯 높이를 최소화하여 9시~23시가 한 화면에 나오게 함 */
        .fc-timegrid-slot { 
            height: 18px !important; /* 이 값을 조절하여 전체 세로 길이를 맞춥니다 */
            border-bottom: 1px solid #f0f0f0 !important; 
        }
        
        /* 첫 번째 칼럼 시간 글자 스타일 */
        .calendar-box:first-child .fc-timegrid-slot-label { 
            display: block !important; 
            width: 35px; 
            font-size: 10px !important; 
            text-align: right; 
            padding-right: 5px;
        }

        /* 5. 일정(Event) 텍스트 디자인 */
        .fc-event { cursor: default !important; border: none !important; border-radius: 0 !important; }
        .event-text { 
            font-size: 9px; 
            color: white; 
            padding: 1px; 
            line-height: 1.1; 
            text-align: center; 
            word-break: break-all; 
            white-space: normal; 
        }
        
        /* 캘린더 내부 여백 제거 */
        .fc-timegrid-slots td { border: none !important; }
    </style>
</head>
<body>

    <div class="date-controls">
        <span class="main-date" id="main-date"></span>
        <button onclick="changeDate(-1)">◀ Prev</button>
        <button onclick="goToToday()">Today</button>
        <button onclick="changeDate(1)">Next ▶</button>
    </div>
    
    <div class="calendar-container">
        <div class="calendar-box"><h3 class="calendar-title">No.01</h3><div id="calendar1" class="calendar"></div></div>
        <div class="calendar-box"><h3 class="calendar-title">No.02</h3><div id="calendar2" class="calendar"></div></div>
        <div class="calendar-box"><h3 class="calendar-title">No.03</h3><div id="calendar3" class="calendar"></div></div>
        <div class="calendar-box"><h3 class="calendar-title">No.04</h3><div id="calendar4" class="calendar"></div></div>
        <div class="calendar-box"><h3 class="calendar-title">No.05</h3><div id="calendar5" class="calendar"></div></div>
        <div class="calendar-box"><h3 class="calendar-title">No.06</h3><div id="calendar6" class="calendar"></div></div>
        <div class="calendar-box"><h3 class="calendar-title">No.07</h3><div id="calendar7" class="calendar"></div></div>
        <div class="calendar-box"><h3 class="calendar-title">No.08</h3><div id="calendar8" class="calendar"></div></div>
        <div class="calendar-box"><h3 class="calendar-title">test.01</h3><div id="calendar9" class="calendar"></div></div>
        <div class="calendar-box"><h3 class="calendar-title">test.02</h3><div id="calendar10" class="calendar"></div></div>
        <div class="calendar-box"><h3 class="calendar-title">test.03</h3><div id="calendar11" class="calendar"></div></div>
        <div class="calendar-box"><h3 class="calendar-title">test.04</h3><div id="calendar12" class="calendar"></div></div>
        <div class="calendar-box"><h3 class="calendar-title">test.05</h3><div id="calendar13" class="calendar"></div></div>
        <div class="calendar-box"><h3 class="calendar-title">test.06</h3><div id="calendar14" class="calendar"></div></div>
    </div>

    <script>
        let currentDate = new Date();
        window.calendars = [];

        // 상단 날짜 텍스트 업데이트 (YYYY. MM. DD. (요일))
        function updateMainDate() {
            let options = { weekday: 'short', year: 'numeric', month: 'numeric', day: 'numeric' };
            document.getElementById('main-date').innerText = currentDate.toLocaleDateString('ko-KR', options);
        }

        // 날짜 이동 함수
        function changeDate(days) {
            currentDate.setDate(currentDate.getDate() + days);
            updateMainDate();
            calendars.forEach(cal => cal.gotoDate(currentDate));
        }

        function goToToday() {
            currentDate = new Date();
            updateMainDate();
            calendars.forEach(cal => cal.gotoDate(currentDate));
        }

        document.addEventListener('DOMContentLoaded', function() {
            updateMainDate();
            
            // 캘린더 데이터 매핑
            const calendarData = [
                { id: "learningfactory01@gmail.com", element: "calendar1", color: "#34A853" },
                { id: "learningfactory11@gmail.com", element: "calendar2", color: "#34A853" },
                { id: "learningfactory03@gmail.com", element: "calendar3", color: "#34A853" },
                { id: "learningfactory13@gmail.com", element: "calendar4", color: "#34A853" },
                { id: "learningfactory05@gmail.com", element: "calendar5", color: "#34A853" },
                { id: "learningfactory06@gmail.com", element: "calendar6", color: "#34A853" },
                { id: "learningfactory10@gmail.com", element: "calendar7", color: "#34A853" },
                { id: "learningfactory08@gmail.com", element: "calendar8", color: "#34A853" },
                { id: "learningfactory04@gmail.com", element: "calendar9", color: "#4285F4" },
                { id: "learningfactory09@gmail.com", element: "calendar10", color: "#4285F4" },
                { id: "learningfactory19@gmail.com", element: "calendar11", color: "#4285F4" },
                { id: "learningfactory20@gmail.com", element: "calendar12", color: "#4285F4" },
                { id: "learningfactory12@gmail.com", element: "calendar13", color: "#4285F4" },
                { id: "learningfactory24@gmail.com", element: "calendar14", color: "#4285F4" }
            ];

            calendarData.forEach((cal) => {
                let calendarEl = document.getElementById(cal.element);
                if (!calendarEl) return;

                let calendar = new FullCalendar.Calendar(calendarEl, {
                    initialView: 'timeGridDay',
                    timeZone: 'Asia/Seoul',
                    slotMinTime: '09:00:00', // 시작 시간
                    slotMaxTime: '23:00:00', // 종료 시간
                    slotDuration: '01:00:00', // [핵심] 1시간 단위로 압축하여 세로 길이 축소
                    allDaySlot: false,
                    contentHeight: 'auto', 
                    expandRows: true, // 설정한 높이에 맞춰 행 높이 자동 배분
                    headerToolbar: false,

                    googleCalendarApiKey: "AIzaSyAUU-C7wQhYfOYaGbm4VdhJ6kKqgeru4MM",
                    eventSources: [{ googleCalendarId: cal.id, color: cal.color }],

                    // 보안 설정 (클릭 방지 및 링크 제거)
                    eventClick: function(info) { info.jsEvent.preventDefault(); },
                    eventDidMount: function(info) { info.el.removeAttribute('href'); },
                    
                    // 이벤트 내용 구성 (이름만 표시)
                    eventContent: function(arg) {
                        let domNode = document.createElement('div');
                        domNode.classList.add('event-text');
                        domNode.innerText = arg.event.title; 
                        return { domNodes: [domNode] };
                    }
                });
                calendar.render();
                calendars.push(calendar);
            });
        });
    </script>
</body>
</html>
