<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Printer Schedule (Read-Only)</title>

    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/google-calendar@5.11.3/main.global.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css">
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; padding: 20px; }
        
        /* 캘린더들을 가로로 나열하는 컨테이너 */
        .calendar-container {
            display: flex;
            overflow-x: auto;
            padding: 10px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .calendar-box {
            display: inline-block;
            flex-shrink: 0; /* 너비 고정 */
        }

        .calendar-title {
            font-size: 15px;
            font-weight: bold;
            padding: 10px 0;
            text-align: center;
            background: #eee;
            margin: 0;
            border: 1px solid #ddd;
        }

        .calendar {
            width: 130px; 
            height: 600px; 
            border: 1px solid #ddd;
        }

        /* 날짜 컨트롤 및 대문 날짜 스타일 */
        .date-controls { text-align: center; margin-bottom: 25px; }
        #main-date { font-size: 24px; font-weight: bold; color: #333; display: block; margin-bottom: 15px; }
        .date-controls button { 
            padding: 8px 15px; 
            margin: 0 5px; 
            cursor: pointer; 
            border-radius: 4px; 
            border: 1px solid #007bff; 
            background: #fff; 
            color: #007bff;
            font-weight: bold;
            transition: 0.2s;
        }
        .date-controls button:hover { background: #007bff; color: #fff; }

        /* FullCalendar 내부 UI 조정 */
        .fc-col-header { display: none; } /* 요일 제거 */
        .fc-timegrid-slot-label { display: none !important; } /* 기본 시간 라벨 숨김 */
        .fc-timegrid-slot { height: 25px !important; } 
        .fc-event { border: none !important; cursor: default !important; } /* 커서 모양 화살표로 고정 */
        
        /* 첫 번째 칼럼에만 시간축 표시 */
        .calendar-box:first-child .fc-timegrid-slot-label { 
            display: block !important; 
            width: 50px; 
            font-size: 11px !important; 
            text-align: right;
            padding-right: 5px;
        }
        .calendar-box:first-child .calendar { width: 180px; }

        /* 일정 텍스트 스타일 */
        .event-text {
            font-size: 11px;
            color: white;
            padding: 2px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>

    <div class="date-controls">
        <span id="main-date"></span>
        <button onclick="changeDate(-1)">◀ Prev.</button>
        <button onclick="goToToday()">Today</button>
        <button onclick="changeDate(1)">Next ▶</button>
    </div>
    
    <div class="calendar-container">
        <div class="calendar-box"><h3 class="calendar-title">No.01</h3><div id="calendar1" class="calendar"></div></div>
        <div class="calendar-box"><h3 class="calendar-title">No.02</h3><div id="calendar2" class="calendar"></div></div>
        <div class="calendar-box"><h3 class="calendar-title">No.03</h3><div id="calendar3" class="calendar"></div></div>
        <div class="calendar-box"><h3 class="calendar-title">No.04</h3><div id="calendar4" class="calendar"></div></div>
        <div class="calendar-box"><h3 class="calendar-title">No.05</h3><div id="calendar5" class="calendar"></div></div>
        <div class="calendar-box"><h3 class="calendar-title">No.06</h3><div id="calendar6" class="calendar"></div></div>
        <div class="calendar-box"><h3 class="calendar-title">No.07</h3><div id="calendar7" class="calendar"></div></div>
        <div class="calendar-box"><h3 class="calendar-title">No.08</h3><div id="calendar8" class="calendar"></div></div>
        <div class="calendar-box"><h3 class="calendar-title">test.01</h3><div id="calendar8" class="calendar"></div></div>
        <div class="calendar-box"><h3 class="calendar-title">test.02</h3><div id="calendar8" class="calendar"></div></div>
        <div class="calendar-box"><h3 class="calendar-title">test.03</h3><div id="calendar8" class="calendar"></div></div>
        <div class="calendar-box"><h3 class="calendar-title">test.04</h3><div id="calendar8" class="calendar"></div></div>
        <div class="calendar-box"><h3 class="calendar-title">test.05</h3><div id="calendar8" class="calendar"></div></div>
        <div class="calendar-box"><h3 class="calendar-title">test.06</h3><div id="calendar8" class="calendar"></div></div>
    </div>

    <script>
        let currentDate = new Date();
        window.calendars = [];

        function updateMainDate() {
            let options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('main-date').innerText = currentDate.toLocaleDateString('ko-KR', options);
        }

        function changeDate(days) {
            currentDate.setDate(currentDate.getDate() + days);
            updateMainDate();
            calendars.forEach(cal => cal.gotoDate(currentDate));
        }

        function goToToday() {
            currentDate = new Date();
            updateMainDate();
            calendars.forEach(cal => cal.gotoDate(currentDate));
        }

        document.addEventListener('DOMContentLoaded', function() {
            updateMainDate();
            
            const calendarData = [
                { id: "learningfactory01@gmail.com", element: "calendar1", color: "#34A853" },
                { id: "learningfactory11@gmail.com", element: "calendar2", color: "#34A853" },
                { id: "learningfactory03@gmail.com", element: "calendar3", color: "#34A853" },
                { id: "learningfactory13@gmail.com", element: "calendar4", color: "#34A853" },
                { id: "learningfactory05@gmail.com", element: "calendar5", color: "#34A853" },
                { id: "learningfactory06@gmail.com", element: "calendar6", color: "#34A853" },
                { id: "learningfactory10@gmail.com", element: "calendar7", color: "#34A853" },
                { id: "learningfactory08@gmail.com", element: "calendar8", color: "#34A853" },
                { id: "learningfactory04@gmail.com", element: "calendar9", color: "#34A853" },
                { id: "learningfactory09@gmail.com", element: "calendar10", color: "#34A853" },
                { id: "learningfactory02@gmail.com", element: "calendar11", color: "#34A853" },
                { id: "learningfactory07@gmail.com", element: "calendar12", color: "#34A853" },
                { id: "learningfactory12@gmail.com", element: "calendar13", color: "#34A853" },
                { id: "learningfactory14@gmail.com", element: "calendar14", color: "#34A853" }
            ];

            calendarData.forEach((cal) => {
                let calendarEl = document.getElementById(cal.element);
                let calendar = new FullCalendar.Calendar(calendarEl, {
                    initialView: 'timeGridDay',
                    timeZone: 'Asia/Seoul',
                    slotMinTime: '09:00:00',
                    slotMaxTime: '23:00:00',
                    allDaySlot: false,
                    height: "auto",
                    headerToolbar: false,
                    editable: false, // 마우스 드래그 수정 불가

                    // 구글 캘린더 API 설정
                    googleCalendarApiKey: "AIzaSyAUU-C7wQhYfOYaGbm4VdhJ6kKqgeru4MM",
                    eventSources: [{ googleCalendarId: cal.id, color: cal.color }],

                    // [핵심 보안 1] 왼쪽 클릭 시 구글 페이지 이동 방지
                    eventClick: function(info) {
                        info.jsEvent.preventDefault();
                    },

                    // [핵심 보안 2] 일정 요소가 화면에 나타날 때 링크 속성(href) 강제 제거
                    eventDidMount: function(info) {
                        // info.el은 실제 <a> 태그 요소입니다.
                        info.el.removeAttribute('href'); // 링크 주소 삭제 (우클릭 새 탭 열기 방지)
                        info.el.style.pointerEvents = 'auto'; // 이벤트는 받되 링크 기능만 상실
                    },

                    // [핵심 보안 3] 내용을 순수 텍스트로만 구성 (기존 링크 구조 무시)
                    eventContent: function(arg) {
                        let domNode = document.createElement('div');
                        domNode.classList.add('event-text');
                        domNode.innerText = arg.event.title; // 제목만 텍스트로 삽입
                        return { domNodes: [domNode] };
                    }
                });
                calendar.render();
                calendars.push(calendar);
            });
        });
    </script>
</body>
</html>
