<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>
  <style>
    /* 1. 디자인 및 레이아웃 (이전 요청사항 100% 반영) */
    body { font-family: 'Malgun Gothic', sans-serif; margin: 0; background: #fff; overflow-x: hidden; }
    .status-area { width: 100%; height: 600px; overflow: hidden; border-bottom: 2px solid #f0f0f0; position: relative; }
    iframe { width: 83.33%; height: 100%; border: none; position: absolute; transform: scale(1.2); transform-origin: top left; }

    .main-grid { max-width: 1400px; margin: 40px auto; padding: 0 20px; display: flex; gap: 30px; flex-wrap: wrap; }
    .section { flex: 1; min-width: 350px; }
    h2 { font-size: 19px; color: #007bff; border-bottom: 2px solid #007bff; padding-bottom: 8px; margin-bottom: 20px; }

    /* 장비 버튼 스타일 */
    .printer-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
    .p-btn { 
      width: 42px; height: 42px; border: 2px solid #007bff; background: #fff; color: #007bff; 
      font-weight: bold; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .p-btn.selected { background: #007bff; color: #fff; }
    
    /* 월력 중앙 배치 */
    .calendar-wrapper { display: flex; justify-content: center; margin-top: 15px; }

    /* 시간 버튼 스타일 */
    .time-list { display: flex; flex-direction: column; gap: 10px; }
    .t-btn { width: 100%; padding: 15px; border: 1px solid #28a745; background: #fff; color: #28a745; font-weight: bold; border-radius: 6px; cursor: pointer; }
    .t-btn.active { background: #28a745; color: #fff; }
    .t-btn:disabled { background: #f8f9fa; border-color: #ddd; color: #ccc; cursor: not-allowed; text-decoration: line-through; }

    /* 로딩 마스크 */
    #full-loading { position: fixed; top:0; left:0; width:100%; height:100%; background:#fff; display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:9999; }
    .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #007bff; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 10px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="full-loading">
  <div class="spinner"></div>
  <div id="loading-msg">서버 데이터 동기화 중...</div>
</div>

<div class="status-area">
  <iframe src="https://learningfactory.github.io/LF-calendar/"></iframe>
</div>

<div class="main-grid">
  <div class="section">
    <h2>01. 인적 사항</h2>
    <input type="text" id="u_name" placeholder="성함 (필수)" style="width:100%; padding:12px; margin-bottom:10px;">
    <label><input type="checkbox" id="u_agree"> 이용 방침 동의</label>
  </div>

  <div class="section">
    <h2>02. 장비 및 날짜</h2>
    <div id="p_info" style="font-size:13px; color:#007bff; margin-bottom:10px; font-weight:bold;">장비를 선택하세요.</div>
    <div class="printer-row" id="row-1"></div>
    <div class="printer-row" id="row-2"></div>
    <div class="calendar-wrapper"><div id="picker"></div></div>
  </div>

  <div class="section">
    <h2>03. 시간 선택</h2>
    <div class="time-list">
      <button class="t-btn" data-time="10:00~13:00" onclick="toggleSlot(this)">10:00 ~ 13:00</button>
      <button class="t-btn" data-time="13:00~16:00" onclick="toggleSlot(this)">13:00 ~ 16:00</button>
      <button class="t-btn" data-time="16:00~19:00" onclick="toggleSlot(this)">16:00 ~ 19:00</button>
      <button class="t-btn" data-time="19:00~22:00" onclick="toggleSlot(this)">19:00 ~ 22:00</button>
    </div>
    <button onclick="submitReservation()" style="width:100%; padding:20px; background:#007bff; color:#fff; border:none; font-weight:bold; margin-top:20px; cursor:pointer;">예약 신청 완료</button>
  </div>
</div>

<script>
  // ⚠️ 중요: 여기에 본인의 GAS 웹 앱 배포 URL을 입력하세요.
  const GAS_URL = "https://script.google.com/macros/s/배포_아이디/exec";

  let cachedPrinters = [], cachedEvents = {}, selectedPrinter = null, selectedSlots = [], fp;

  window.onload = async () => {
    // 월력 초기화
    fp = flatpickr("#picker", { inline: true, locale: "ko", minDate: "today", maxDate: new Date().fp_incr(3), defaultDate: "today", onChange: renderSlots });
    
    // 깃허브 로드 즉시 GAS API 호출 (비동기 통신)
    try {
      const res = await fetch(`${GAS_URL}?action=init`);
      const data = await res.json();
      cachedPrinters = data.printers;
      cachedEvents = data.allEvents;
      initButtons();
      document.getElementById('full-loading').style.display = 'none';
    } catch (e) {
      document.getElementById('loading-msg').innerText = "데이터 로드 실패. URL을 확인하세요.";
    }
  };

  function initButtons() {
    const r1 = document.getElementById('row-1'), r2 = document.getElementById('row-2');
    cachedPrinters.forEach((p, i) => {
      const btn = document.createElement('button');
      btn.className = 'p-btn'; btn.innerText = p.no;
      btn.onclick = () => {
        document.querySelectorAll('.p-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedPrinter = p;
        document.getElementById('p_info').innerText = `${p.no}번: ${p.name} (${p.model})`;
        renderSlots();
      };
      if (i < 10) r1.appendChild(btn); else r2.appendChild(btn);
    });
  }

  function renderSlots() {
    selectedSlots = [];
    const btns = document.querySelectorAll('.t-btn');
    btns.forEach(b => { b.classList.remove('active'); b.disabled = !selectedPrinter; });
    if (!selectedPrinter) return;

    const targetDate = fp.input.value;
    const occupied = (cachedEvents[selectedPrinter.email] || [])
      .filter(e => e.date === targetDate).map(e => e.slot);
    
    btns.forEach(b => { if (occupied.includes(b.getAttribute('data-time'))) b.disabled = true; });
  }

  function toggleSlot(btn) {
    if (!selectedPrinter) return alert("장비 선택 필수");
    btn.classList.toggle('active');
    const val = btn.getAttribute('data-time');
    if (selectedSlots.includes(val)) selectedSlots = selectedSlots.filter(s => s !== val);
    else selectedSlots.push(val);
  }

  async function submitReservation() {
    if (!selectedPrinter || selectedSlots.length === 0) return alert("장비와 시간을 선택하세요.");
    
    document.getElementById('full-loading').style.display = 'flex';
    const payload = {
      email: selectedPrinter.email,
      name: selectedPrinter.name,
      date: fp.input.value,
      slots: selectedSlots,
      user: { name: document.getElementById('u_name').value /* 학번 등 추가 필드 연동 */ }
    };

    const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify(payload) });
    alert(await res.text());
    location.reload();
  }
</script>
</body>
</html>
