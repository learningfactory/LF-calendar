<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>
  <style>
    /* 1. 기본 스타일 */
    body { font-family: 'Malgun Gothic', sans-serif; margin: 0; padding: 0; background: #fff; overflow-x: hidden; color: #333; }
    
    /* [0] 상단 현황판 (600px 고정, 1.2배 확대, 스크롤 제거) */
    .status-area { 
      width: 100%; height: 600px; overflow: hidden; border-bottom: 2px solid #f0f0f0; position: relative; 
    }
    iframe { 
      width: 83.33%; height: 100%; border: none; position: absolute; top: 0; left: 0;
      transform: scale(1.2); transform-origin: top left;
    }

    /* 전체 레이아웃 (3섹션 분할) */
    .main-grid { 
      max-width: 1400px; margin: 40px auto; padding: 0 20px; 
      display: flex; gap: 40px; flex-wrap: wrap; align-items: flex-start;
    }
    .section { flex: 1; min-width: 320px; }
    h2 { font-size: 19px; color: #007bff; border-bottom: 2px solid #007bff; padding-bottom: 8px; margin-bottom: 25px; }

    /* [1] 인적 사항 섹션 */
    .form-group input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
    .agree-label { font-size: 13px; color: #666; cursor: pointer; display: flex; align-items: center; gap: 5px; }

    /* [2] 장비 및 날짜 섹션 (요청사항 반영) */
    #p_info_display { font-size: 14px; color: #007bff; font-weight: bold; margin-bottom: 15px; min-height: 1.2em; }
    .printer-grid { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
    .printer-row { display: flex; gap: 8px; justify-content: flex-start; }
    
    .p-btn { 
      width: 44px; height: 44px; border: 2px solid #007bff; background: #fff; color: #007bff; 
      font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    .p-btn.selected { background: #007bff; color: #fff; }

    /* 월력 중앙 배치 */
    .calendar-container { display: flex; justify-content: center; margin-top: 15px; width: 100%; }
    .flatpickr-calendar { border-radius: 0 !important; box-shadow: none !important; border: 1px solid #eee !important; }

    /* [3] 시간 선택 섹션 */
    .time-list { display: flex; flex-direction: column; gap: 12px; }
    .t-btn { 
      width: 100%; padding: 16px; border: 1px solid #28a745; background: #fff; color: #28a745; 
      font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.2s;
    }
    .t-btn.active { background: #28a745; color: #fff; }
    .t-btn:disabled { background: #f8f9fa; border-color: #ddd; color: #ccc; cursor: not-allowed; text-decoration: line-through; }

    /* 신청 버튼 */
    .btn-submit { 
      width: 100%; padding: 20px; background: #007bff; color: #fff; border: none; 
      font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 30px; border-radius: 6px; 
    }

    /* 로딩 마스크 */
    #loading-mask { 
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; 
      display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; 
    }
    .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #007bff; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* 모바일 대응 */
    @media (max-width: 900px) {
      .main-grid { flex-direction: column; }
      .section { width: 100%; }
      .status-area { overflow-x: auto; -webkit-overflow-scrolling: touch; }
      iframe { width: 1100px; }
    }
  </style>
</head>
<body>

<div id="loading-mask">
  <div class="spinner"></div>
  <div id="load-text">시스템 초기화 중 (Google API 동기화)...</div>
</div>

<div class="status-area">
  <iframe src="https://learningfactory.github.io/LF-calendar/"></iframe>
</div>

<div class="main-grid">
  <div class="section form-group">
    <h2>01. 인적 사항</h2>
    <input type="text" id="u_name" placeholder="성함 (필수)">
    <input type="text" id="u_dept" placeholder="학과">
    <input type="text" id="u_id" placeholder="학번">
    <input type="text" id="u_phone" placeholder="연락처">
    <input type="email" id="u_email" placeholder="이메일 주소">
    <label class="agree-label">
      <input type="checkbox" id="u_agree"> 러닝팩토리 이용 방침에 동의합니다.
    </label>
  </div>

  <div class="section">
    <h2>02. 장비 및 날짜</h2>
    <div id="p_info_display">장비를 선택해 주세요.</div>
    <div class="printer-grid">
      <div class="printer-row" id="row-1"></div> <div class="printer-row" id="row-2"></div> </div>
    <div class="calendar-container">
      <div id="date-picker"></div>
    </div>
  </div>

  <div class="section">
    <h2>03. 시간 선택</h2>
    <div class="time-list">
      <button class="t-btn" data-time="10:00~13:00" onclick="toggleSlot(this)">10:00 ~ 13:00</button>
      <button class="t-btn" data-time="13:00~16:00" onclick="toggleSlot(this)">13:00 ~ 16:00</button>
      <button class="t-btn" data-time="16:00~19:00" onclick="toggleSlot(this)">16:00 ~ 19:00</button>
      <button class="t-btn" data-time="19:00~22:00" onclick="toggleSlot(this)">19:00 ~ 22:00</button>
    </div>
    <button class="btn-submit" onclick="submitReservation()">예약 신청 완료</button>
  </div>
</div>

<script>
  // ⚠️ 본인의 GAS 웹 앱 배포 URL로 교체하세요!
  const GAS_URL = "https://script.google.com/macros/s/AKfycbzxKuLISF2flq3-aKNmSgCNCs_ZkQSY5iORBr3QpSG4HXJ8uveJswdaEenad8IX7dfuEg/exec"; 

  let cachedPrinters = [], cachedEvents = {}, selectedPrinter = null, selectedSlots = [], fp;

  window.onload = async () => {
    // 월력 초기화 (중앙 배치)
    fp = flatpickr("#date-picker", {
      inline: true, locale: "ko", minDate: "today", maxDate: new Date().fp_incr(3),
      defaultDate: "today", onChange: updateSlots
    });

    // 데이터 API 호출
    try {
      const response = await fetch(`${GAS_URL}?action=init`);
      const data = await response.json();
      cachedPrinters = data.printers;
      cachedEvents = data.allEvents;
      initPrinterButtons();
      document.getElementById('loading-mask').style.display = 'none';
    } catch (e) {
      document.getElementById('load-text').innerText = "데이터 통신 오류가 발생했습니다.";
    }
  };

  function initPrinterButtons() {
    const row1 = document.getElementById('row-1'), row2 = document.getElementById('row-2');
    cachedPrinters.forEach((p, idx) => {
      const btn = document.createElement('button');
      btn.className = 'p-btn'; btn.innerText = p.no;
      btn.onclick = () => {
        document.querySelectorAll('.p-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedPrinter = p;
        document.getElementById('p_info_display').innerText = `${p.no}번 장비: ${p.name}`;
        updateSlots();
      };
      if (idx < 10) row1.appendChild(btn); else row2.appendChild(btn);
    });
  }

  function updateSlots() {
    selectedSlots = [];
    const btns = document.querySelectorAll('.t-btn');
    btns.forEach(b => { b.classList.remove('active'); b.disabled = !selectedPrinter; });
    if (!selectedPrinter) return;

    const date = fp.input.value;
    const occupied = (cachedEvents[selectedPrinter.email] || [])
      .filter(e => e.date === date).map(e => e.slot);
    
    btns.forEach(b => { if (occupied.includes(b.getAttribute('data-time'))) b.disabled = true; });
  }

  function toggleSlot(btn) {
    if (!selectedPrinter) return alert("장비를 먼저 선택해 주세요.");
    btn.classList.toggle('active');
    const val = btn.getAttribute('data-time');
    if (selectedSlots.includes(val)) selectedSlots = selectedSlots.filter(s => s !== val);
    else selectedSlots.push(val);
  }

  async function submitReservation() {
    if (!selectedPrinter || selectedSlots.length === 0) return alert("장비와 시간을 선택해 주세요.");
    if (!document.getElementById('u_name').value) return alert("성함을 입력해 주세요.");
    if (!document.getElementById('u_agree').checked) return alert("이용 방침에 동의해 주세요.");

    document.getElementById('loading-mask').style.display = 'flex';
    document.getElementById('load-text').innerText = "예약 신청 처리 중...";

    const payload = {
      email: selectedPrinter.email, name: selectedPrinter.name,
      date: fp.input.value, slots: selectedSlots,
      user: {
        name: document.getElementById('u_name').value,
        dept: document.getElementById('u_dept').value,
        id: document.getElementById('u_id').value,
        phone: document.getElementById('u_phone').value,
        email: document.getElementById('u_email').value
      }
    };

    try {
      const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify(payload) });
      const text = await res.text();
      alert(text);
      location.reload();
    } catch (e) {
      alert("예약 중 오류가 발생했습니다.");
      document.getElementById('loading-mask').style.display = 'none';
    }
  }
</script>
</body>
</html>
